<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyberpunk Lab - AR Product Viewer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #0a0a1e; font-family: 'Courier New', monospace; color: #c0d0ff; }
        canvas { display: block; }

        #start-screen {
            position: fixed; inset: 0; z-index: 100;
            background: radial-gradient(ellipse at center, #12122a 0%, #0a0a1e 70%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer;
        }
        #start-screen h1 {
            font-size: 2.8rem; color: #c0d0ff; text-shadow: 0 0 30px #6c5ce7, 0 0 80px #6c5ce788;
            letter-spacing: 0.3em; margin-bottom: 1rem;
        }
        #start-screen .subtitle {
            color: #8888cc; font-size: 0.85rem; letter-spacing: 0.5em; margin-bottom: 3rem;
        }
        #start-btn {
            background: transparent; border: 2px solid #c0d0ff; color: #c0d0ff;
            padding: 16px 48px; font-size: 1.1rem; font-family: 'Courier New', monospace;
            letter-spacing: 0.3em; cursor: pointer; position: relative; overflow: hidden;
            transition: all 0.3s;
        }
        #start-btn:hover {
            background: #c0d0ff15; box-shadow: 0 0 30px #c0d0ff44, inset 0 0 30px #c0d0ff11;
            text-shadow: 0 0 10px #c0d0ff;
        }
        #start-btn::before {
            content: ''; position: absolute; top: -2px; left: -100%; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, #c0d0ff, transparent);
            animation: scanline 2s linear infinite;
        }
        @keyframes scanline { to { left: 100%; } }
        #start-screen .controls-hint {
            margin-top: 3rem; color: #6677aa88; font-size: 0.7rem; letter-spacing: 0.2em; text-align: center; line-height: 2.2;
        }

        #crosshair {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 50; pointer-events: none; display: none;
        }
        #crosshair::before, #crosshair::after {
            content: ''; position: absolute; background: #c0d0ffaa;
        }
        #crosshair::before { width: 2px; height: 18px; left: 50%; top: 50%; transform: translate(-50%, -50%); }
        #crosshair::after { width: 18px; height: 2px; left: 50%; top: 50%; transform: translate(-50%, -50%); }
        #crosshair .ch-dot {
            position: absolute; width: 4px; height: 4px; background: #c0d0ff; border-radius: 50%;
            left: 50%; top: 50%; transform: translate(-50%, -50%);
        }

        #hud {
            position: fixed; top: 0; left: 0; right: 0; z-index: 50; pointer-events: none;
            padding: 16px 20px; display: flex; justify-content: space-between;
        }
        .hud-left, .hud-right { display: flex; flex-direction: column; gap: 4px; }
        .hud-left { align-items: flex-start; }
        .hud-right { align-items: flex-end; }
        .hud-text { font-size: 0.7rem; color: #7788bb; letter-spacing: 0.15em; }
        .hud-value { color: #c0d0ff; font-size: 0.75rem; }

        #light-toggle {
            position: fixed; top: 16px; right: 20px; z-index: 60;
            background: #0e0e24ee; border: 1px solid #6c5ce766; color: #c0d0ff;
            padding: 10px 20px; font-family: 'Courier New', monospace; font-size: 0.75rem;
            letter-spacing: 0.2em; cursor: pointer; pointer-events: all;
            transition: all 0.3s; border-radius: 6px;
            display: flex; align-items: center; gap: 10px;
        }
        #light-toggle:hover { border-color: #c0d0ff; box-shadow: 0 0 20px #c0d0ff44; }
        #light-toggle.off { color: #ff6b9d; border-color: #ff6b9d66; background: #1a0a1aee; }
        #light-toggle.off:hover { border-color: #ff6b9d; box-shadow: 0 0 20px #ff6b9d44; }
        .light-dot {
            width: 10px; height: 10px; border-radius: 50%; transition: all 0.4s;
            background: #c0d0ff; box-shadow: 0 0 12px #c0d0ffaa;
        }
        #light-toggle.off .light-dot {
            background: #ff3366; box-shadow: 0 0 12px #ff3366aa;
        }

        #key-indicators {
            position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
            z-index: 50; display: flex; gap: 5px; pointer-events: none;
        }
        .key-box {
            width: 38px; height: 38px; border: 1px solid #44556666; display: flex;
            align-items: center; justify-content: center; font-size: 0.65rem;
            color: #44556688; transition: all 0.08s; font-family: 'Courier New', monospace;
            border-radius: 5px; background: #0a0a1e44;
        }
        .key-box.active {
            border-color: #c0d0ff; color: #c0d0ff; background: #c0d0ff15;
            box-shadow: 0 0 16px #c0d0ff44;
        }
        #key-w { transform: translateY(-24px); }

        #label-tooltip {
            position: fixed; z-index: 55; pointer-events: none; display: none;
            background: #0e0e24DD; border: 1px solid #6c5ce7aa; padding: 10px 18px;
            font-size: 0.75rem; color: #c0d0ff; letter-spacing: 0.15em;
            white-space: nowrap; box-shadow: 0 0 30px #6c5ce744; border-radius: 6px;
        }

        #back-link {
            position: fixed; bottom: 24px; left: 20px; z-index: 60;
            color: #6677aa; text-decoration: none; font-size: 0.7rem;
            letter-spacing: 0.15em; font-family: 'Courier New', monospace;
            transition: color 0.3s;
        }
        #back-link:hover { color: #c0d0ff; }

        #instructions {
            position: fixed; bottom: 24px; right: 20px; z-index: 50;
            font-size: 0.6rem; color: #44556688; letter-spacing: 0.1em;
            text-align: right; line-height: 1.8; pointer-events: none;
        }

        @keyframes pulseLight { 0%,100% { opacity: 0.8; } 50% { opacity: 1; } }
    </style>
</head>
<body>
    <div id="start-screen">
        <h1>CYBERPUNK LAB</h1>
        <div class="subtitle">RESEARCH FACILITY // SECTOR 7</div>
        <button id="start-btn">CLICK TO ENTER</button>
        <div class="controls-hint">
            WASD / ARROWS - MOVE &nbsp;&nbsp; MOUSE - LOOK &nbsp;&nbsp; SHIFT - RUN<br>
            SPACE - JUMP &nbsp;&nbsp; L - TOGGLE LIGHTS &nbsp;&nbsp; ESC - EXIT
        </div>
    </div>

    <div id="crosshair"><div class="ch-dot"></div></div>
    <div id="label-tooltip"></div>

    <div id="hud">
        <div class="hud-left">
            <div class="hud-text">FPS <span class="hud-value" id="fps">0</span></div>
            <div class="hud-text">POS <span class="hud-value" id="pos">0.0, 0.0, 0.0</span></div>
        </div>
        <div class="hud-right">
            <div class="hud-text" id="light-status">LIGHTS: ON</div>
        </div>
    </div>

    <button id="light-toggle"><span class="light-dot"></span>LIGHTS ON/OFF</button>

    <div id="key-indicators">
        <div class="key-box" id="key-a">A</div>
        <div class="key-box" id="key-w" style="transform: translateY(-24px)">W</div>
        <div class="key-box" id="key-s">S</div>
        <div class="key-box" id="key-d">D</div>
        <div class="key-box" id="key-shift" style="width: 50px; font-size: 0.5rem;">SHIFT</div>
        <div class="key-box" id="key-space" style="width: 50px; font-size: 0.5rem;">SPACE</div>
    </div>

    <a id="back-link" href="index.html">&#8592; BACK TO PRODUCTS</a>
    <div id="instructions">ESC TO EXIT POINTER LOCK</div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

    <script>
    (function() {
        var ss = document.getElementById('start-screen');
        var btn = document.getElementById('start-btn');
        var ch = document.getElementById('crosshair');
        function enter() {
            if (ss) ss.style.display = 'none';
            if (ch) ch.style.display = 'block';
            try { document.querySelector('canvas').requestPointerLock(); } catch(e) {}
        }
        if (btn) btn.addEventListener('click', function(e) { e.stopPropagation(); enter(); });
        if (ss) ss.addEventListener('click', enter);
    })();
    </script>

    <script>

        const ROOM_W = 24, ROOM_H = 11, ROOM_D = 24;
        const MOVE_SPEED = 6, RUN_MULTIPLIER = 2.2, JUMP_FORCE = 6, GRAVITY = 14;
        const EYE_HEIGHT = 1.7;

        let scene, camera, renderer, clock;
        let lightsOn = true;
        let velocity = new THREE.Vector3();
        let onGround = true;
        const keys = {};
        let yaw = 0, pitch = 0;
        let pointerLocked = false;
        const raycaster = new THREE.Raycaster();
        const interactables = [];

        const ON = { ambient: 2.5, hemi: 2.0, dir: 1.5, ceiling: 3.0, accent: 2.0, wallStrip: 1.0, fog: 0.01, bg: 0x0c0c22, exposure: 1.5, panel: 1.0, panelOp: 0.95 };
        const OFF = { ambient: 0.12, hemi: 0.06, dir: 0.03, ceiling: 0.06, accent: 0.06, wallStrip: 0.15, fog: 0.055, bg: 0x040410, exposure: 0.45, panel: 0.06, panelOp: 0.15 };

        const ambientLight = new THREE.AmbientLight(0x667799, ON.ambient);
        const hemiLight = new THREE.HemisphereLight(0xaabbdd, 0x444466, ON.hemi);
        const dirLight = new THREE.DirectionalLight(0xeeeeff, ON.dir);
        const ceilingLights = [];
        const accentLights = [];
        const ceilingPanelMeshes = [];
        const wallStripLights = [];
        let lightT = 1.0, lightTarget = 1.0;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(ON.bg);
            scene.fog = new THREE.FogExp2(ON.bg, ON.fog);
            clock = new THREE.Clock();

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 120);
            camera.position.set(0, EYE_HEIGHT, 9);
            camera.rotation.order = 'YXZ';

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = ON.exposure;
            renderer.outputColorSpace = THREE.SRGBColorSpace;
            document.body.appendChild(renderer.domElement);

            setupLighting();
            createRoom();
            createLabBenches();
            createEquipment();

            window.addEventListener('resize', onResize);
            setupControls();
            animate();
        }

        function lerp(a, b, t) { return a + (b - a) * Math.min(t, 1); }

        function setupLighting() {
            scene.add(ambientLight);
            scene.add(hemiLight);

            dirLight.position.set(5, ROOM_H - 1, 5);
            dirLight.castShadow = true;
            dirLight.shadow.mapSize.set(2048, 2048);
            const sc = dirLight.shadow.camera;
            sc.left = -14; sc.right = 14; sc.top = 14; sc.bottom = -14; sc.near = 0.5; sc.far = 35;
            dirLight.shadow.bias = -0.001;
            scene.add(dirLight);

            [[-7, -7], [7, -7], [0, 0], [-7, 7], [7, 7]].forEach(([x, z]) => {
                const pl = new THREE.PointLight(0xccddff, ON.ceiling, 32);
                pl.position.set(x, ROOM_H - 0.3, z);
                pl.castShadow = true;
                pl.shadow.mapSize.set(512, 512);
                pl.shadow.bias = -0.002;
                scene.add(pl);
                ceilingLights.push(pl);

                const panelMat = new THREE.MeshStandardMaterial({
                    color: 0xddeeff, emissive: 0xaaccff, emissiveIntensity: ON.panel,
                    transparent: true, opacity: ON.panelOp,
                });
                const panel = new THREE.Mesh(new THREE.BoxGeometry(2.0, 0.06, 0.9), panelMat);
                panel.position.set(x, ROOM_H - 0.05, z);
                scene.add(panel);
                ceilingPanelMeshes.push(panelMat);
            });

            [
                { color: 0x00ff88, pos: [-ROOM_W / 2 + 0.3, 3, 0] },
                { color: 0xff6b9d, pos: [ROOM_W / 2 - 0.3, 4, -3] },
                { color: 0x4488ff, pos: [0, 3, -ROOM_D / 2 + 0.3] },
                { color: 0xffaa00, pos: [5, 2.5, 0] },
                { color: 0xaa44ff, pos: [-5, 5, ROOM_D / 2 - 0.3] },
            ].forEach(d => {
                const al = new THREE.PointLight(d.color, ON.accent, 16);
                al.position.set(...d.pos);
                scene.add(al);
                accentLights.push(al);

                const glow = new THREE.Mesh(
                    new THREE.SphereGeometry(0.12, 12, 12),
                    new THREE.MeshBasicMaterial({ color: d.color })
                );
                glow.position.set(...d.pos);
                scene.add(glow);
            });
        }

        function toggleLights() {
            lightsOn = !lightsOn;
            lightTarget = lightsOn ? 1.0 : 0.0;
            document.getElementById('light-status').textContent = lightsOn ? 'LIGHTS: ON' : 'LIGHTS: OFF';
            document.getElementById('light-status').style.color = lightsOn ? '#c0d0ff' : '#ff6b9d';
            document.getElementById('light-toggle').classList.toggle('off', !lightsOn);
        }

        function updateLighting(dt) {
            lightT = lerp(lightT, lightTarget, dt * 3.5);
            const t = lightT;
            ambientLight.intensity = lerp(OFF.ambient, ON.ambient, t);
            hemiLight.intensity = lerp(OFF.hemi, ON.hemi, t);
            dirLight.intensity = lerp(OFF.dir, ON.dir, t);
            ceilingLights.forEach(l => l.intensity = lerp(OFF.ceiling, ON.ceiling, t));
            accentLights.forEach(l => l.intensity = lerp(OFF.accent, ON.accent, t));
            wallStripLights.forEach(l => l.intensity = lerp(OFF.wallStrip, ON.wallStrip, t));
            scene.fog.density = lerp(OFF.fog, ON.fog, t);
            renderer.toneMappingExposure = lerp(OFF.exposure, ON.exposure, t);
            const bgVal = new THREE.Color().lerpColors(new THREE.Color(OFF.bg), new THREE.Color(ON.bg), t);
            scene.background.copy(bgVal);
            ceilingPanelMeshes.forEach(m => {
                m.emissiveIntensity = lerp(OFF.panel, ON.panel, t);
                m.opacity = lerp(OFF.panelOp, ON.panelOp, t);
            });
        }

        function createRoom() {
            const wallMat = new THREE.MeshStandardMaterial({ color: 0x151528, roughness: 0.85, metalness: 0.1 });
            const floorMat = new THREE.MeshStandardMaterial({ color: 0x101020, roughness: 0.6, metalness: 0.2 });

            const floor = new THREE.Mesh(new THREE.PlaneGeometry(ROOM_W, ROOM_D), floorMat);
            floor.rotation.x = -Math.PI / 2;
            floor.receiveShadow = true;
            scene.add(floor);

            const c = document.createElement('canvas');
            c.width = 512; c.height = 512;
            const ctx = c.getContext('2d');
            ctx.fillStyle = '#101020';
            ctx.fillRect(0, 0, 512, 512);
            ctx.strokeStyle = '#2a2a4a';
            ctx.lineWidth = 2;
            for (let i = 0; i <= 16; i++) {
                const p = (i / 16) * 512;
                ctx.beginPath(); ctx.moveTo(p, 0); ctx.lineTo(p, 512); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, p); ctx.lineTo(512, p); ctx.stroke();
            }
            ctx.strokeStyle = '#3a3a6a'; ctx.lineWidth = 1;
            for (let i = 0; i <= 4; i++) {
                const p = (i / 4) * 512;
                ctx.beginPath(); ctx.moveTo(p, 0); ctx.lineTo(p, 512); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, p); ctx.lineTo(512, p); ctx.stroke();
            }
            const gt = new THREE.CanvasTexture(c);
            gt.wrapS = gt.wrapT = THREE.RepeatWrapping;
            gt.repeat.set(ROOM_W / 2, ROOM_D / 2);
            floorMat.map = gt;
            floorMat.needsUpdate = true;

            const ceil = new THREE.Mesh(new THREE.PlaneGeometry(ROOM_W, ROOM_D),
                new THREE.MeshStandardMaterial({ color: 0x151528, roughness: 1, emissive: 0x080818, emissiveIntensity: 0.3 }));
            ceil.rotation.x = Math.PI / 2; ceil.position.y = ROOM_H;
            scene.add(ceil);

            [[0, ROOM_H / 2, -ROOM_D / 2, 0], [0, ROOM_H / 2, ROOM_D / 2, Math.PI],
             [-ROOM_W / 2, ROOM_H / 2, 0, Math.PI / 2], [ROOM_W / 2, ROOM_H / 2, 0, -Math.PI / 2]
            ].forEach(([x, y, z, ry]) => {
                const w = new THREE.Mesh(new THREE.PlaneGeometry(ROOM_W, ROOM_H), wallMat);
                w.position.set(x, y, z); w.rotation.y = ry;
                scene.add(w);
            });

            addWallDetails();
        }

        function addWallDetails() {
            const sm = new THREE.MeshStandardMaterial({
                color: 0x6c5ce7, emissive: 0x6c5ce7, emissiveIntensity: 0.6, transparent: true, opacity: 0.8,
            });
            const sg = new THREE.BoxGeometry(ROOM_W, 0.04, 0.02);
            [1.5, 4, 6.5, 9].forEach(y => {
                [-ROOM_D / 2 + 0.02, ROOM_D / 2 - 0.02].forEach(z => {
                    scene.add(Object.assign(new THREE.Mesh(sg, sm), { position: new THREE.Vector3(0, y, z) }));
                });
            });
            const vg = new THREE.BoxGeometry(0.02, ROOM_H, 0.02);
            [-ROOM_W / 2 + 0.02, ROOM_W / 2 - 0.02].forEach(x => {
                scene.add(Object.assign(new THREE.Mesh(vg, sm), { position: new THREE.Vector3(x, ROOM_H / 2, 0) }));
            });

            [[0, 4, -ROOM_D / 2 + 0.5], [0, 4, ROOM_D / 2 - 0.5], [-ROOM_W / 2 + 0.5, 4, 0], [ROOM_W / 2 - 0.5, 4, 0]].forEach(p => {
                const sl = new THREE.PointLight(0x6c5ce7, ON.wallStrip, 10);
                sl.position.set(...p);
                scene.add(sl);
                wallStripLights.push(sl);
            });

            const screenWall = new THREE.Mesh(
                new THREE.PlaneGeometry(5, 3),
                new THREE.MeshStandardMaterial({ color: 0x0a1a2a, emissive: 0x112244, emissiveIntensity: 0.5 })
            );
            screenWall.position.set(0, 5, -ROOM_D / 2 + 0.05);
            scene.add(screenWall);
            const screenFrame = new THREE.Mesh(
                new THREE.BoxGeometry(5.1, 3.1, 0.02),
                new THREE.MeshStandardMaterial({ color: 0x6c5ce7, emissive: 0x6c5ce7, emissiveIntensity: 0.4 })
            );
            screenFrame.position.set(0, 5, -ROOM_D / 2 + 0.04);
            scene.add(screenFrame);
            const screenGlow = new THREE.PointLight(0x2244aa, 1.0, 8);
            screenGlow.position.set(0, 5, -ROOM_D / 2 + 1);
            scene.add(screenGlow);
        }

        function createBench(x, z, rot = 0) {
            const g = new THREE.Group();
            const legM = new THREE.MeshStandardMaterial({ color: 0x445566, roughness: 0.3, metalness: 0.8 });
            const topM = new THREE.MeshStandardMaterial({ color: 0x1e1e38, roughness: 0.4, metalness: 0.3 });
            const accM = new THREE.MeshStandardMaterial({ color: 0x6c5ce7, emissive: 0x6c5ce7, emissiveIntensity: 0.3 });

            const top = new THREE.Mesh(new THREE.BoxGeometry(4.5, 0.08, 1.3), topM);
            top.position.y = 0.9; top.castShadow = true; top.receiveShadow = true;
            g.add(top);
            g.add(Object.assign(new THREE.Mesh(new THREE.BoxGeometry(4.54, 0.025, 1.34), accM), { position: new THREE.Vector3(0, 0.955, 0) }));

            [[-2.0, -0.55], [2.0, -0.55], [-2.0, 0.55], [2.0, 0.55]].forEach(([lx, lz]) => {
                const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, 0.9, 8), legM);
                leg.position.set(lx, 0.45, lz); leg.castShadow = true; g.add(leg);
            });

            g.add(Object.assign(new THREE.Mesh(new THREE.BoxGeometry(4.1, 0.04, 1.1), new THREE.MeshStandardMaterial({ color: 0x181830, roughness: 0.6, metalness: 0.4 })), { position: new THREE.Vector3(0, 0.4, 0) }));

            const bl = new THREE.PointLight(0xaabbff, 0.8, 7);
            bl.position.set(0, 1.6, 0); g.add(bl);

            g.position.set(x, 0, z); g.rotation.y = rot;
            scene.add(g);
            interactables.push({ type: 'bench', box: new THREE.Box3().setFromObject(g), group: g });
        }

        function createLabBenches() {
            createBench(-6, -6); createBench(6, -6); createBench(-6, 6); createBench(6, 6);
            createBench(0, 0, Math.PI / 2);
        }

        function createEquipment() {
            setupBenchEquip(-6, -6, ['beakers', 'microscope', 'monitor', 'notebook']);
            setupBenchEquip(6, -6, ['flask', 'bunsen', 'pipette', 'petri']);
            setupBenchEquip(-6, 6, ['testtubes', 'centrifuge', 'reagent', 'spectro']);
            setupBenchEquip(6, 6, ['distillation', 'monitor2', 'flask2', 'syringe']);
            setupBenchEquip(0, 0, ['molecular', 'printer', 'scales', 'holo']);
        }

        function setupBenchEquip(bx, bz, items) {
            const Y = 0.98;
            const glass = new THREE.MeshStandardMaterial({ color: 0xaaddff, transparent: true, opacity: 0.4, roughness: 0.05, metalness: 0.1 });
            const tint = new THREE.MeshStandardMaterial({ color: 0x66ffaa, transparent: true, opacity: 0.35, roughness: 0.05 });
            const metal = new THREE.MeshStandardMaterial({ color: 0x8899aa, roughness: 0.2, metalness: 0.9 });
            const dark = new THREE.MeshStandardMaterial({ color: 0x334455, roughness: 0.5, metalness: 0.4 });
            const scr = new THREE.MeshStandardMaterial({ color: 0x1a2a3a, emissive: 0x22aaff, emissiveIntensity: 0.8 });
            const ld = [];

            function emMat(c, ei = 0.3) { return new THREE.MeshStandardMaterial({ color: c, transparent: true, opacity: 0.7, emissive: c, emissiveIntensity: ei }); }

            if (items.includes('beakers')) {
                const g = new THREE.Group();
                [0, 1, 2].forEach(i => {
                    const b = new THREE.Mesh(new THREE.CylinderGeometry(0.06 + i * 0.02, 0.05 + i * 0.02, 0.14 + i * 0.04, 16), glass);
                    b.position.set(-1.4 + i * 0.25, Y + 0.07 + i * 0.02, -0.3); b.castShadow = true; g.add(b);
                    g.add(Object.assign(new THREE.Mesh(new THREE.CylinderGeometry(0.048 + i * 0.018, 0.038 + i * 0.018, 0.04 + i * 0.01, 16),
                        emMat([0x22bbff, 0xff6baa, 0x55ff99][i])), { position: new THREE.Vector3(-1.4 + i * 0.25, Y + 0.04, -0.3) }));
                });
                g.position.set(bx, 0, bz); scene.add(g);
                ld.push({ name: 'BEAKERS', pos: new THREE.Vector3(bx - 1.2, Y + 0.3, bz - 0.3) });
            }

            if (items.includes('flask') || items.includes('flask2')) {
                const g = new THREE.Group();
                const f = items.includes('flask2') ? 0.7 : -0.6;

        function setupControls() {
            const ss = document.getElementById('start-screen');
            const ch = document.getElementById('crosshair');
            const btn = document.getElementById('start-btn');
            let labEntered = false;

            function hideStartScreen() {
                if (labEntered) return;
                labEntered = true;
                ss.style.display = 'none';
                ch.style.display = 'block';
                try { renderer.domElement.requestPointerLock(); } catch(e) {}
            }

            btn.addEventListener('click', e => { e.stopPropagation(); hideStartScreen(); });
            ss.addEventListener('click', hideStartScreen);
            renderer.domElement.addEventListener('click', () => {
                if (!pointerLocked) {
                    try { renderer.domElement.requestPointerLock(); } catch(e) {}
                }
            });

            document.addEventListener('pointerlockchange', () => {
                pointerLocked = !!document.pointerLockElement;
                ch.style.display = pointerLocked ? 'block' : 'none';
            });

            document.addEventListener('mousemove', e => {
                if (!pointerLocked) return;
                yaw -= e.movementX * 0.002;
                pitch -= e.movementY * 0.002;
                pitch = Math.max(-Math.PI / 2 + 0.01, Math.min(Math.PI / 2 - 0.01, pitch));
                camera.rotation.y = yaw;
                camera.rotation.x = pitch;
            });

            let touchStartX = 0, touchStartY = 0, touchLookActive = false;
            let touchMoveStartX = 0, touchMoveStartY = 0, touchMoveActive = false;
            const isMobile = 'ontouchstart' in window || navigator.maxTouchPoints > 0;

            if (isMobile) {
                const moveZone = document.createElement('div');
                moveZone.id = 'touch-move-zone';
                moveZone.style.cssText = 'position:fixed;bottom:30px;left:30px;width:120px;height:120px;border:2px solid #c0d0ff44;border-radius:50%;z-index:70;display:flex;align-items:center;justify-content:center;touch-action:none;';
                moveZone.innerHTML = '<div style="width:40px;height:40px;border:2px solid #c0d0ff88;border-radius:50%;transition:none;" id="touch-stick"></div>';
                document.body.appendChild(moveZone);

                const lookZone = document.createElement('div');
                lookZone.id = 'touch-look-zone';
                lookZone.style.cssText = 'position:fixed;bottom:30px;right:30px;width:120px;height:120px;border:2px solid #c0d0ff44;border-radius:50%;z-index:70;display:flex;align-items:center;justify-content:center;touch-action:none;';
                lookZone.innerHTML = '<div style="width:12px;height:12px;background:#c0d0ff88;border-radius:50%;transition:none;" id="look-dot"></div>';
                document.body.appendChild(lookZone);

                moveZone.addEventListener('touchstart', e => {
                    e.preventDefault();
                    touchMoveActive = true;
                    const t = e.touches[0];
                    const r = moveZone.getBoundingClientRect();
                    touchMoveStartX = t.clientX - r.left - r.width / 2;
                    touchMoveStartY = t.clientY - r.top - r.height / 2;
                }, { passive: false });

                moveZone.addEventListener('touchmove', e => {
                    e.preventDefault();
                    if (!touchMoveActive) return;
                    const t = e.touches[0];
                    const r = moveZone.getBoundingClientRect();
                    const dx = t.clientX - r.left - r.width / 2;
                    const dy = t.clientY - r.top - r.height / 2;
                    const maxDist = 40;
                    const clampedX = Math.max(-maxDist, Math.min(maxDist, dx));
                    const clampedY = Math.max(-maxDist, Math.min(maxDist, dy));
                    const stick = document.getElementById('touch-stick');
                    stick.style.transform = `translate(${clampedX}px, ${clampedY}px)`;
                    const normX = clampedX / maxDist;
                    const normY = clampedY / maxDist;
                    keys['KeyW'] = normY < -0.2;
                    keys['KeyS'] = normY > 0.2;
                    keys['KeyA'] = normX < -0.2;
                    keys['KeyD'] = normX > 0.2;
                    updateKeyIndicators();
                }, { passive: false });

                const endMove = () => {
                    touchMoveActive = false;
                    const stick = document.getElementById('touch-stick');
                    if (stick) stick.style.transform = 'translate(0,0)';
                    keys['KeyW'] = keys['KeyS'] = keys['KeyA'] = keys['KeyD'] = false;
                    updateKeyIndicators();
                };
                moveZone.addEventListener('touchend', endMove);
                moveZone.addEventListener('touchcancel', endMove);

                lookZone.addEventListener('touchstart', e => {
                    e.preventDefault();
                    touchLookActive = true;
                    touchStartX = e.touches[0].clientX;
                    touchStartY = e.touches[0].clientY;
                }, { passive: false });

                lookZone.addEventListener('touchmove', e => {
                    e.preventDefault();
                    if (!touchLookActive) return;
                    const dx = e.touches[0].clientX - touchStartX;
                    const dy = e.touches[0].clientY - touchStartY;
                    yaw -= dx * 0.004;
                    pitch -= dy * 0.004;
                    pitch = Math.max(-Math.PI / 2 + 0.01, Math.min(Math.PI / 2 - 0.01, pitch));
                    camera.rotation.y = yaw;
                    camera.rotation.x = pitch;
                    touchStartX = e.touches[0].clientX;
                    touchStartY = e.touches[0].clientY;
                }, { passive: false });

                lookZone.addEventListener('touchend', () => { touchLookActive = false; });
                lookZone.addEventListener('touchcancel', () => { touchLookActive = false; });
            }

            document.addEventListener('keydown', e => {
                keys[e.code] = true;
                updateKeyIndicators();
                if (e.code === 'KeyL') toggleLights();
                if (['Space', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.code)) e.preventDefault();
            });
            document.addEventListener('keyup', e => {
                keys[e.code] = false;
                updateKeyIndicators();
            });

            document.getElementById('light-toggle').addEventListener('click', toggleLights);
        }

        function updateKeyIndicators() {
            const w = keys['KeyW'] || keys['ArrowUp'];
            const s = keys['KeyS'] || keys['ArrowDown'];
            const a = keys['KeyA'] || keys['ArrowLeft'];
            const d = keys['KeyD'] || keys['ArrowRight'];
            document.getElementById('key-a').classList.toggle('active', !!a);
            document.getElementById('key-w').classList.toggle('active', !!w);
            document.getElementById('key-s').classList.toggle('active', !!s);
            document.getElementById('key-d').classList.toggle('active', !!d);
            document.getElementById('key-shift').classList.toggle('active', !!keys['ShiftLeft'] || !!keys['ShiftRight']);
            document.getElementById('key-space').classList.toggle('active', !!keys['Space']);
        }

        const colliders = [];
        function updateColliders() {
            colliders.length = 0;
            interactables.filter(i => i.type === 'bench').forEach(b => colliders.push(b.box));
        }

        function checkCollision(pos, radius = 0.35) {
            for (const c of colliders) {
                const n = new THREE.Vector3(
                    Math.max(c.min.x, Math.min(pos.x, c.max.x)),
                    Math.max(c.min.y, Math.min(pos.y, c.max.y)),
                    Math.max(c.min.z, Math.min(pos.z, c.max.z))
                );
                if (pos.distanceTo(n) < radius) return true;
            }
            return false;
        }

        let fpsF = 0, fpsT = 0, fpsD = 0;

        function animate() {
            requestAnimationFrame(animate);
            const dt = Math.min(clock.getDelta(), 0.05);
            updateLighting(dt);

            if (labEntered) {
                const spd = (keys['ShiftLeft'] || keys['ShiftRight']) ? MOVE_SPEED * RUN_MULTIPLIER : MOVE_SPEED;
                const fwd = new THREE.Vector3(-Math.sin(yaw), 0, -Math.cos(yaw));
                const rgt = new THREE.Vector3(Math.cos(yaw), 0, -Math.sin(yaw));

                const mv = new THREE.Vector3();
                if (keys['KeyW'] || keys['ArrowUp']) mv.add(fwd);
                if (keys['KeyS'] || keys['ArrowDown']) mv.sub(fwd);
                if (keys['KeyA'] || keys['ArrowLeft']) mv.sub(rgt);
                if (keys['KeyD'] || keys['ArrowRight']) mv.add(rgt);
                if (mv.length() > 0) mv.normalize();

                velocity.x = mv.x * spd;
                velocity.z = mv.z * spd;

                if (keys['Space'] && onGround) { velocity.y = JUMP_FORCE; onGround = false; }
                velocity.y -= GRAVITY * dt;

                const nx = camera.position.clone(); nx.x += velocity.x * dt;
                if (!checkCollision(nx)) camera.position.x = nx.x; else velocity.x = 0;

                const nz = camera.position.clone(); nz.z += velocity.z * dt;
                if (!checkCollision(nz)) camera.position.z = nz.z; else velocity.z = 0;

                camera.position.y += velocity.y * dt;
                if (camera.position.y <= EYE_HEIGHT) { camera.position.y = EYE_HEIGHT; velocity.y = 0; onGround = true; }

                camera.position.x = Math.max(-ROOM_W / 2 + 0.5, Math.min(ROOM_W / 2 - 0.5, camera.position.x));
                camera.position.z = Math.max(-ROOM_D / 2 + 0.5, Math.min(ROOM_D / 2 - 0.5, camera.position.z));

                updateLabels();
            }

            fpsF++; fpsT += dt;
            if (fpsT >= 0.5) { fpsD = Math.round(fpsF / fpsT); fpsT = 0; fpsF = 0; }
            document.getElementById('fps').textContent = fpsD;
            document.getElementById('pos').textContent = `${camera.position.x.toFixed(1)}, ${camera.position.y.toFixed(1)}, ${camera.position.z.toFixed(1)}`;

            renderer.render(scene, camera);
        }

        function updateLabels() {
            const tip = document.getElementById('label-tooltip');
            let hit = false;
            const cd = new THREE.Vector3();
            camera.getWorldDirection(cd);
            for (const item of interactables) {
                if (item.type !== 'label') continue;
                if (camera.position.distanceTo(item.pos) < item.distance) {
                    const dir = item.pos.clone().sub(camera.position).normalize();
                    if (cd.dot(dir) > 0.82) {
                        tip.textContent = item.name;
                        tip.style.display = 'block';
                        tip.style.left = '50%';
                        tip.style.top = 'calc(50% - 60px)';
                        tip.style.transform = 'translateX(-50%)';
                        hit = true; break;
                    }
                }
            }
            if (!hit) tip.style.display = 'none';
        }

        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        init();
        updateColliders();
    </script>
</body>
</html>
