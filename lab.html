<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyberpunk Lab - AR Product Viewer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #0a0a1e; font-family: 'Courier New', monospace; color: #c0d0ff; }
        canvas { display: block; }

        #start-screen {
            position: fixed; inset: 0; z-index: 100;
            background: radial-gradient(ellipse at center, #12122a 0%, #0a0a1e 70%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer;
        }
        #start-screen h1 {
            font-size: 2.8rem; color: #c0d0ff; text-shadow: 0 0 30px #6c5ce7, 0 0 80px #6c5ce788;
            letter-spacing: 0.3em; margin-bottom: 1rem;
        }
        #start-screen .subtitle {
            color: #8888cc; font-size: 0.85rem; letter-spacing: 0.5em; margin-bottom: 3rem;
        }
        #start-btn {
            background: transparent; border: 2px solid #c0d0ff; color: #c0d0ff;
            padding: 16px 48px; font-size: 1.1rem; font-family: 'Courier New', monospace;
            letter-spacing: 0.3em; cursor: pointer; position: relative; overflow: hidden;
            transition: all 0.3s;
        }
        #start-btn:hover {
            background: #c0d0ff15; box-shadow: 0 0 30px #c0d0ff44, inset 0 0 30px #c0d0ff11;
            text-shadow: 0 0 10px #c0d0ff;
        }
        #start-btn::before {
            content: ''; position: absolute; top: -2px; left: -100%; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, #c0d0ff, transparent);
            animation: scanline 2s linear infinite;
        }
        @keyframes scanline { to { left: 100%; } }
        #start-screen .controls-hint {
            margin-top: 3rem; color: #6677aa88; font-size: 0.7rem; letter-spacing: 0.2em; text-align: center; line-height: 2.2;
        }

        #crosshair {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 50; pointer-events: none; display: none;
        }
        #crosshair::before, #crosshair::after {
            content: ''; position: absolute; background: #c0d0ffaa;
        }
        #crosshair::before { width: 2px; height: 18px; left: 50%; top: 50%; transform: translate(-50%, -50%); }
        #crosshair::after { width: 18px; height: 2px; left: 50%; top: 50%; transform: translate(-50%, -50%); }

        #hud {
            position: fixed; top: 0; left: 0; right: 0; z-index: 50; pointer-events: none;
            padding: 16px 20px; display: flex; justify-content: space-between;
        }
        .hud-left, .hud-right { display: flex; flex-direction: column; gap: 4px; }
        .hud-left { align-items: flex-start; }
        .hud-right { align-items: flex-end; }
        .hud-text { font-size: 0.7rem; color: #7788bb; letter-spacing: 0.15em; }
        .hud-value { color: #c0d0ff; font-size: 0.75rem; }

        #light-toggle {
            position: fixed; top: 16px; right: 20px; z-index: 60;
            background: #0e0e24ee; border: 1px solid #6c5ce766; color: #c0d0ff;
            padding: 10px 20px; font-family: 'Courier New', monospace; font-size: 0.75rem;
            letter-spacing: 0.2em; cursor: pointer; pointer-events: all;
            transition: all 0.3s; border-radius: 6px;
        }
        #light-toggle:hover { border-color: #c0d0ff; box-shadow: 0 0 20px #c0d0ff44; }
        #light-toggle.off { color: #ff6b9d; border-color: #ff6b9d66; background: #1a0a1aee; }
        #light-toggle.off:hover { border-color: #ff6b9d; box-shadow: 0 0 20px #ff6b9d44; }

        #key-indicators {
            position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
            z-index: 50; display: flex; gap: 6px; pointer-events: none;
        }
        .key-box {
            width: 44px; height: 44px; border: 1px solid #44556666; display: flex;
            align-items: center; justify-content: center; font-size: 0.75rem;
            color: #44556688; transition: all 0.08s; font-family: 'Courier New', monospace;
            border-radius: 6px; background: #0a0a1e44;
        }
        .key-box.active {
            border-color: #c0d0ff; color: #c0d0ff; background: #c0d0ff15;
            box-shadow: 0 0 20px #c0d0ff44;
        }
        #key-w { transform: translateY(-28px); }

        #label-tooltip {
            position: fixed; z-index: 55; pointer-events: none; display: none;
            background: #0e0e24DD; border: 1px solid #6c5ce7aa; padding: 10px 18px;
            font-size: 0.75rem; color: #c0d0ff; letter-spacing: 0.15em;
            white-space: nowrap; box-shadow: 0 0 30px #6c5ce744; border-radius: 6px;
        }

        #back-link {
            position: fixed; bottom: 24px; left: 20px; z-index: 60;
            color: #6677aa; text-decoration: none; font-size: 0.7rem;
            letter-spacing: 0.15em; font-family: 'Courier New', monospace;
            transition: color 0.3s;
        }
        #back-link:hover { color: #c0d0ff; }

        #instructions {
            position: fixed; bottom: 24px; right: 20px; z-index: 50;
            font-size: 0.6rem; color: #44556688; letter-spacing: 0.1em;
            text-align: right; line-height: 1.8; pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="start-screen">
        <h1>CYBERPUNK LAB</h1>
        <div class="subtitle">RESEARCH FACILITY // SECTOR 7</div>
        <button id="start-btn">CLICK TO ENTER</button>
        <div class="controls-hint">
            WASD - MOVE &nbsp;&nbsp; MOUSE - LOOK &nbsp;&nbsp; SHIFT - RUN<br>
            SPACE - JUMP &nbsp;&nbsp; L - TOGGLE LIGHTS &nbsp;&nbsp; ESC - EXIT
        </div>
    </div>

    <div id="crosshair"></div>
    <div id="label-tooltip"></div>

    <div id="hud">
        <div class="hud-left">
            <div class="hud-text">FPS <span class="hud-value" id="fps">0</span></div>
            <div class="hud-text">POS <span class="hud-value" id="pos">0.0, 0.0, 0.0</span></div>
        </div>
        <div class="hud-right">
            <div class="hud-text" id="light-status">LIGHTS: ON</div>
        </div>
    </div>

    <button id="light-toggle">LIGHTS ON/OFF</button>

    <div id="key-indicators">
        <div class="key-box" id="key-a">A</div>
        <div class="key-box" id="key-w" style="transform: translateY(-28px)">W</div>
        <div class="key-box" id="key-s">S</div>
        <div class="key-box" id="key-d">D</div>
        <div class="key-box" id="key-shift" style="width: 58px; font-size: 0.55rem;">SHIFT</div>
        <div class="key-box" id="key-space" style="width: 58px; font-size: 0.55rem;">SPACE</div>
    </div>

    <a id="back-link" href="index.html">&#8592; BACK TO PRODUCTS</a>
    <div id="instructions">ESC TO EXIT POINTER LOCK</div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';

        const ROOM_W = 20, ROOM_H = 10, ROOM_D = 20;
        const MOVE_SPEED = 6, RUN_MULTIPLIER = 2.2, JUMP_FORCE = 6, GRAVITY = 14;
        const EYE_HEIGHT = 1.7;

        let scene, camera, renderer, clock;
        let lightsOn = true;
        let velocity = new THREE.Vector3();
        let onGround = true;
        const keys = {};
        let yaw = 0, pitch = 0;
        let pointerLocked = false;
        const raycaster = new THREE.Raycaster();
        const interactables = [];

        const ambientLight = new THREE.AmbientLight(0x667799, 2.5);
        const hemiLight = new THREE.HemisphereLight(0xaabbdd, 0x444466, 2.0);
        const dirLight = new THREE.DirectionalLight(0xeeeeff, 1.5);
        const ceilingLights = [];
        const accentLights = [];
        const ceilingPanelMeshes = [];
        let targetFogDensity = 0.012;

        const ON_STATE = {
            ambient: 2.5, hemi: 2.0, dir: 1.5,
            ceiling: 3.0, accent: 2.0,
            fog: 0.012, background: 0x0a0a1e,
            exposure: 1.5, panelEmissive: 1.0, panelOpacity: 0.95,
        };
        const OFF_STATE = {
            ambient: 0.15, hemi: 0.08, dir: 0.05,
            ceiling: 0.08, accent: 0.08,
            fog: 0.06, background: 0x040410,
            exposure: 0.5, panelEmissive: 0.08, panelOpacity: 0.2,
        };

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(ON_STATE.background);
            scene.fog = new THREE.FogExp2(ON_STATE.background, ON_STATE.fog);
            clock = new THREE.Clock();

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 120);
            camera.position.set(0, EYE_HEIGHT, 8);
            camera.rotation.order = 'YXZ';

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = ON_STATE.exposure;
            renderer.outputColorSpace = THREE.SRGBColorSpace;
            document.body.appendChild(renderer.domElement);

            setupLighting();
            createRoom();
            createLabBenches();
            createEquipment();

            window.addEventListener('resize', onResize);
            setupControls();
            animate();
        }

        function lerp(a, b, t) { return a + (b - a) * t; }

        function setupLighting() {
            scene.add(ambientLight);
            scene.add(hemiLight);

            dirLight.position.set(5, ROOM_H - 1, 5);
            dirLight.castShadow = true;
            dirLight.shadow.mapSize.set(2048, 2048);
            dirLight.shadow.camera.left = -12;
            dirLight.shadow.camera.right = 12;
            dirLight.shadow.camera.top = 12;
            dirLight.shadow.camera.bottom = -12;
            dirLight.shadow.camera.near = 0.5;
            dirLight.shadow.camera.far = 30;
            dirLight.shadow.bias = -0.001;
            scene.add(dirLight);

            const ceilPositions = [
                [-6, ROOM_H - 0.3, -6], [6, ROOM_H - 0.3, -6],
                [0, ROOM_H - 0.3, 0],
                [-6, ROOM_H - 0.3, 6], [6, ROOM_H - 0.3, 6],
            ];
            ceilPositions.forEach(pos => {
                const pl = new THREE.PointLight(0xccddff, ON_STATE.ceiling, 30);
                pl.position.set(...pos);
                pl.castShadow = true;
                pl.shadow.mapSize.set(512, 512);
                pl.shadow.bias = -0.002;
                scene.add(pl);
                ceilingLights.push(pl);

                const panelGeo = new THREE.BoxGeometry(1.8, 0.06, 0.8);
                const panelMat = new THREE.MeshStandardMaterial({
                    color: 0xddeeff, emissive: 0xaaccff, emissiveIntensity: ON_STATE.panelEmissive,
                    transparent: true, opacity: ON_STATE.panelOpacity,
                });
                const panel = new THREE.Mesh(panelGeo, panelMat);
                panel.position.set(pos[0], ROOM_H - 0.05, pos[2]);
                scene.add(panel);
                ceilingPanelMeshes.push({ mesh: panel, mat: panelMat });
            });

            const accentDefs = [
                { color: 0x00ff88, pos: [-ROOM_W / 2 + 0.3, 3, 0], intensity: ON_STATE.accent },
                { color: 0xff6b9d, pos: [ROOM_W / 2 - 0.3, 4, -3], intensity: ON_STATE.accent },
                { color: 0x4488ff, pos: [0, 3, -ROOM_D / 2 + 0.3], intensity: ON_STATE.accent },
            ];
            accentDefs.forEach(d => {
                const al = new THREE.PointLight(d.color, d.intensity, 15);
                al.position.set(...d.pos);
                scene.add(al);
                accentLights.push(al);

                const glowGeo = new THREE.SphereGeometry(0.1, 12, 12);
                const glowMat = new THREE.MeshBasicMaterial({ color: d.color });
                const glow = new THREE.Mesh(glowGeo, glowMat);
                glow.position.set(...d.pos);
                scene.add(glow);
            });
        }

        let lightTransition = 1.0;
        let lightTarget = 1.0;

        function toggleLights() {
            lightsOn = !lightsOn;
            lightTarget = lightsOn ? 1.0 : 0.0;
            document.getElementById('light-status').textContent = lightsOn ? 'LIGHTS: ON' : 'LIGHTS: OFF';
            document.getElementById('light-status').style.color = lightsOn ? '#c0d0ff' : '#ff6b9d';
            document.getElementById('light-toggle').classList.toggle('off', !lightsOn);
        }

        function updateLighting(dt) {
            lightTransition = lerp(lightTransition, lightTarget, dt * 4);
            const t = lightTransition;

            ambientLight.intensity = lerp(OFF_STATE.ambient, ON_STATE.ambient, t);
            hemiLight.intensity = lerp(OFF_STATE.hemi, ON_STATE.hemi, t);
            dirLight.intensity = lerp(OFF_STATE.dir, ON_STATE.dir, t);
            ceilingLights.forEach(l => l.intensity = lerp(OFF_STATE.ceiling, ON_STATE.ceiling, t));
            accentLights.forEach(l => l.intensity = lerp(OFF_STATE.accent, ON_STATE.accent, t));

            scene.fog.density = lerp(OFF_STATE.fog, ON_STATE.fog, t);
            scene.background.setHex(lerp(OFF_STATE.background, ON_STATE.background, t) | 0);
            renderer.toneMappingExposure = lerp(OFF_STATE.exposure, ON_STATE.exposure, t);

            ceilingPanelMeshes.forEach(p => {
                p.mat.emissiveIntensity = lerp(OFF_STATE.panelEmissive, ON_STATE.panelEmissive, t);
                p.mat.opacity = lerp(OFF_STATE.panelOpacity, ON_STATE.panelOpacity, t);
            });
        }

        function createRoom() {
            const wallMat = new THREE.MeshStandardMaterial({ color: 0x151528, roughness: 0.85, metalness: 0.1 });
            const floorMat = new THREE.MeshStandardMaterial({ color: 0x101020, roughness: 0.6, metalness: 0.2 });

            const floorGeo = new THREE.PlaneGeometry(ROOM_W, ROOM_D);
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            floor.receiveShadow = true;
            scene.add(floor);

            const gridCanvas = document.createElement('canvas');
            gridCanvas.width = 512; gridCanvas.height = 512;
            const ctx = gridCanvas.getContext('2d');
            ctx.fillStyle = '#101020';
            ctx.fillRect(0, 0, 512, 512);
            ctx.strokeStyle = '#2a2a4a';
            ctx.lineWidth = 2;
            for (let i = 0; i <= 16; i++) {
                const p = (i / 16) * 512;
                ctx.beginPath(); ctx.moveTo(p, 0); ctx.lineTo(p, 512); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, p); ctx.lineTo(512, p); ctx.stroke();
            }
            ctx.strokeStyle = '#3a3a6a';
            ctx.lineWidth = 1;
            for (let i = 0; i <= 4; i++) {
                const p = (i / 4) * 512;
                ctx.beginPath(); ctx.moveTo(p, 0); ctx.lineTo(p, 512); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, p); ctx.lineTo(512, p); ctx.stroke();
            }
            const gridTex = new THREE.CanvasTexture(gridCanvas);
            gridTex.wrapS = gridTex.wrapT = THREE.RepeatWrapping;
            gridTex.repeat.set(ROOM_W / 2, ROOM_D / 2);
            floorMat.map = gridTex;
            floorMat.needsUpdate = true;

            const ceiling = new THREE.Mesh(
                new THREE.PlaneGeometry(ROOM_W, ROOM_D),
                new THREE.MeshStandardMaterial({ color: 0x151528, roughness: 1, emissive: 0x080818, emissiveIntensity: 0.3 })
            );
            ceiling.rotation.x = Math.PI / 2;
            ceiling.position.y = ROOM_H;
            scene.add(ceiling);

            const walls = [
                { pos: [0, ROOM_H / 2, -ROOM_D / 2], rot: [0, 0, 0] },
                { pos: [0, ROOM_H / 2, ROOM_D / 2], rot: [0, Math.PI, 0] },
                { pos: [-ROOM_W / 2, ROOM_H / 2, 0], rot: [0, Math.PI / 2, 0] },
                { pos: [ROOM_W / 2, ROOM_H / 2, 0], rot: [0, -Math.PI / 2, 0] },
            ];
            walls.forEach(w => {
                const wall = new THREE.Mesh(new THREE.PlaneGeometry(ROOM_W, ROOM_H), wallMat);
                wall.position.set(...w.pos);
                wall.rotation.set(...w.rot);
                scene.add(wall);
            });

            addWallDetails();
        }

        function addWallDetails() {
            const stripMat = new THREE.MeshStandardMaterial({
                color: 0x6c5ce7, emissive: 0x6c5ce7, emissiveIntensity: 0.6,
                transparent: true, opacity: 0.8,
            });
            const stripGeo = new THREE.BoxGeometry(ROOM_W, 0.04, 0.02);

            [1.5, 4, 6.5].forEach(y => {
                const s1 = new THREE.Mesh(stripGeo, stripMat);
                s1.position.set(0, y, -ROOM_D / 2 + 0.02);
                scene.add(s1);
                const s2 = new THREE.Mesh(stripGeo, stripMat);
                s2.position.set(0, y, ROOM_D / 2 - 0.02);
                scene.add(s2);
            });

            const vStripGeo = new THREE.BoxGeometry(0.02, ROOM_H, 0.02);
            [-ROOM_W / 2 + 0.02, ROOM_W / 2 - 0.02].forEach(x => {
                const s = new THREE.Mesh(vStripGeo, stripMat);
                s.position.set(x, ROOM_H / 2, 0);
                scene.add(s);
            });

            const stripLight1 = new THREE.PointLight(0x6c5ce7, 1.0, 8);
            stripLight1.position.set(0, 4, -ROOM_D / 2 + 0.5);
            scene.add(stripLight1);
            const stripLight2 = new THREE.PointLight(0x6c5ce7, 1.0, 8);
            stripLight2.position.set(0, 4, ROOM_D / 2 - 0.5);
            scene.add(stripLight2);
        }

        function createBench(x, z, rotation = 0) {
            const group = new THREE.Group();
            const legMat = new THREE.MeshStandardMaterial({ color: 0x445566, roughness: 0.3, metalness: 0.8 });
            const topMat = new THREE.MeshStandardMaterial({ color: 0x1e1e38, roughness: 0.4, metalness: 0.3 });
            const accentMat = new THREE.MeshStandardMaterial({ color: 0x6c5ce7, emissive: 0x6c5ce7, emissiveIntensity: 0.3 });

            const topGeo = new THREE.BoxGeometry(4, 0.08, 1.2);
            const top = new THREE.Mesh(topGeo, topMat);
            top.position.y = 0.9;
            top.castShadow = true;
            top.receiveShadow = true;
            group.add(top);

            const edgeGeo = new THREE.BoxGeometry(4.04, 0.025, 1.24);
            const edge = new THREE.Mesh(edgeGeo, accentMat);
            edge.position.y = 0.955;
            group.add(edge);

            const legPositions = [[-1.8, -0.5], [1.8, -0.5], [-1.8, 0.5], [1.8, 0.5]];
            legPositions.forEach(([lx, lz]) => {
                const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, 0.9, 8), legMat);
                leg.position.set(lx, 0.45, lz);
                leg.castShadow = true;
                group.add(leg);
            });

            const shelfMat = new THREE.MeshStandardMaterial({ color: 0x181830, roughness: 0.6, metalness: 0.4 });
            const shelf = new THREE.Mesh(new THREE.BoxGeometry(3.6, 0.04, 1.0), shelfMat);
            shelf.position.y = 0.4;
            group.add(shelf);

            const benchLight = new THREE.PointLight(0xaabbff, 0.8, 6);
            benchLight.position.set(0, 1.5, 0);
            group.add(benchLight);

            group.position.set(x, 0, z);
            group.rotation.y = rotation;
            scene.add(group);

            const box = new THREE.Box3().setFromObject(group);
            interactables.push({ type: 'bench', box, group });

            return group;
        }

        function createLabBenches() {
            createBench(-5, -5, 0);
            createBench(5, -5, 0);
            createBench(-5, 5, 0);
            createBench(5, 5, 0);
        }

        function createEquipment() {
            const benchConfigs = [
                { x: -5, z: -5, items: ['beakers', 'microscope', 'monitor'] },
                { x: 5, z: -5, items: ['flask', 'bunsen', 'pipette'] },
                { x: -5, z: 5, items: ['testtubes', 'centrifuge', 'reagent'] },
                { x: 5, z: 5, items: ['distillation', 'monitor2', 'flask2'] },
            ];
            benchConfigs.forEach(cfg => createBenchEquipment(cfg.x, cfg.z, cfg.items));
        }

        function createBenchEquipment(bx, bz, items) {
            const baseY = 0.98;
            const glassMat = new THREE.MeshStandardMaterial({
                color: 0xaaddff, transparent: true, opacity: 0.4, roughness: 0.05, metalness: 0.1,
            });
            const glassTinted = new THREE.MeshStandardMaterial({
                color: 0x66ffaa, transparent: true, opacity: 0.35, roughness: 0.05, metalness: 0.1,
            });
            const metalMat = new THREE.MeshStandardMaterial({ color: 0x8899aa, roughness: 0.2, metalness: 0.9 });
            const darkMat = new THREE.MeshStandardMaterial({ color: 0x334455, roughness: 0.5, metalness: 0.4 });
            const screenMat = new THREE.MeshStandardMaterial({
                color: 0x1a2a3a, emissive: 0x22aaff, emissiveIntensity: 0.8,
            });
            const labelDefs = [];

            if (items.includes('beakers')) {
                const g = new THREE.Group();
                for (let i = 0; i < 3; i++) {
                    const b = new THREE.Mesh(
                        new THREE.CylinderGeometry(0.06 + i * 0.02, 0.05 + i * 0.02, 0.14 + i * 0.04, 16),
                        glassMat
                    );
                    b.position.set(-1.2 + i * 0.25, baseY + 0.07 + i * 0.02, -0.3);
                    b.castShadow = true;
                    g.add(b);
                    const liquid = new THREE.Mesh(
                        new THREE.CylinderGeometry(0.05 + i * 0.018, 0.04 + i * 0.018, 0.04 + i * 0.01, 16),
                        new THREE.MeshStandardMaterial({
                            color: [0x22bbff, 0xff6baa, 0x55ff99][i], transparent: true, opacity: 0.7,
                            emissive: [0x22bbff, 0xff6baa, 0x55ff99][i], emissiveIntensity: 0.3,
                        })
                    );
                    liquid.position.set(-1.2 + i * 0.25, baseY + 0.04, -0.3);
                    g.add(liquid);
                }
                g.position.set(bx, 0, bz);
                scene.add(g);
                labelDefs.push({ name: 'BEAKERS', pos: new THREE.Vector3(bx - 1.0, baseY + 0.3, bz - 0.3) });
            }

            if (items.includes('flask') || items.includes('flask2')) {
                const g = new THREE.Group();
                const fOff = items.includes('flask2') ? 0.6 : -0.5;
                const body = new THREE.Mesh(new THREE.SphereGeometry(0.1, 16, 16), glassTinted);
                body.scale.y = 0.7;
                body.position.set(fOff, baseY + 0.08, 0.2);
                g.add(body);
                const neck = new THREE.Mesh(new THREE.CylinderGeometry(0.025, 0.04, 0.12, 12), glassTinted);
                neck.position.set(fOff, baseY + 0.2, 0.2);
                g.add(neck);
                const liquid = new THREE.Mesh(
                    new THREE.SphereGeometry(0.08, 12, 12),
                    new THREE.MeshStandardMaterial({
                        color: 0x7744ff, transparent: true, opacity: 0.65,
                        emissive: 0x7744ff, emissiveIntensity: 0.3,
                    })
                );
                liquid.scale.y = 0.5;

            if (items.includes('microscope')) {

            if (items.includes('monitor') || items.includes('monitor2')) {
                const g = new THREE.Group();

            if (items.includes('bunsen')) {

                const burner = new THREE.Mesh(new THREE.CylinderGeometry(0.025, 0.035, 0.15, 12), metalMat);
                burner.position.set(-1.0, baseY + 0.075, 0.3);

                const tube2 = new THREE.Mesh(new THREE.CylinderGeometry(0.008, 0.008, 0.12, 8), metalMat);
                tube2.position.set(-1.0, baseY + 0.2, 0.3);

                const flame = new THREE.Mesh(new THREE.ConeGeometry(0.018, 0.07, 8), flameMat);
                flame.position.set(-1.0, baseY + 0.28, 0.3);
                g.add(flame);
                const flame2 = new THREE.Mesh(new THREE.ConeGeometry(0.01, 0.05, 8),

                flame2.position.set(-1.0, baseY + 0.3, 0.3);
                g.add(flame2);
                const bLight = new THREE.PointLight(0x66aaff, 1.2, 5);
                bLight.position.set(-1.0, baseY + 0.3, 0.3);
                g.add(bLight);
                g.position.set(bx, 0, bz);
                scene.add(g);

            }

            if (items.includes('pipette')) {
                const g = new THREE.Group();
                const stand = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.25, 0.08), darkMat);
                stand.position.set(0.5, baseY + 0.125, 0.3);
                g.add(stand);
                for (let i = 0; i < 3; i++) {
                    const pip = new THREE.Mesh(new THREE.CylinderGeometry(0.004, 0.004, 0.2, 6), glassMat);
                    pip.position.set(0.5, baseY + 0.3, 0.25 + i * 0.05);
                    pip.rotation.z = 0.1;
                    g.add(pip);
                }
                g.position.set(bx, 0, bz);
                scene.add(g);
                labelDefs.push({ name: 'PIPETTE STAND', pos: new THREE.Vector3(bx + 0.5, baseY + 0.4, bz + 0.3) });
            }

            if (items.includes('testtubes')) {
                const g = new THREE.Group();
                const rack = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.03, 0.08), darkMat);
                rack.position.set(-1.3, baseY + 0.1, 0.2);
                g.add(rack);
                const rackTop = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.03, 0.08), darkMat);
                rackTop.position.set(-1.3, baseY + 0.2, 0.2);
                g.add(rackTop);
                const tubeColors = [0xff6baa, 0x55ff99, 0x22bbff, 0xffcc33, 0x7744ff];
                for (let i = 0; i < 5; i++) {
                    const tube = new THREE.Mesh(
                        new THREE.CylinderGeometry(0.01, 0.01, 0.16, 8),
                        new THREE.MeshStandardMaterial({
                            color: tubeColors[i], transparent: true, opacity: 0.45,
                        })
                    );
                    tube.position.set(-1.38 + i * 0.045, baseY + 0.18, 0.2);
                    g.add(tube);
                    const liquid = new THREE.Mesh(
                        new THREE.CylinderGeometry(0.008, 0.008, 0.05 + Math.random() * 0.04, 8),
                        new THREE.MeshStandardMaterial({
                            color: tubeColors[i], transparent: true, opacity: 0.75,
                            emissive: tubeColors[i], emissiveIntensity: 0.2,
                        })
                    );
                    liquid.position.set(-1.38 + i * 0.045, baseY + 0.1, 0.2);
                    g.add(liquid);
                }
                g.position.set(bx, 0, bz);
                scene.add(g);
                labelDefs.push({ name: 'TEST TUBE RACK', pos: new THREE.Vector3(bx - 1.3, baseY + 0.35, bz + 0.2) });
            }

            if (items.includes('centrifuge')) {
                const g = new THREE.Group();
                const body = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.14, 0.15, 24), metalMat);
                body.position.set(0.5, baseY + 0.075, -0.2);
                g.add(body);
                const lid = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.12, 0.02, 24), darkMat);
                lid.position.set(0.5, baseY + 0.16, -0.2);
                g.add(lid);
                const control = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.04, 0.01), screenMat);
                control.position.set(0.5, baseY + 0.1, -0.06);
                g.add(control);
                g.position.set(bx, 0, bz);
                scene.add(g);
                labelDefs.push({ name: 'CENTRIFUGE', pos: new THREE.Vector3(bx + 0.5, baseY + 0.3, bz - 0.2) });
            }

            if (items.includes('reagent')) {
                const g = new THREE.Group();
                for (let row = 0; row < 2; row++) {
                    for (let col = 0; col < 4; col++) {
                        const c = [0xff6baa, 0x55ff99, 0x22bbff, 0xffcc33, 0x7744ff, 0xff5555, 0x55ffbb, 0xccccee][row * 4 + col];
                        const bottle = new THREE.Mesh(
                            new THREE.CylinderGeometry(0.03, 0.03, 0.1 + row * 0.03, 8),
                            new THREE.MeshStandardMaterial({
                                color: c, transparent: true, opacity: 0.5,
                                emissive: c, emissiveIntensity: 0.15,
                            })
                        );
                        bottle.position.set(-1.5 + col * 0.1, baseY + 0.06 + row * 0.015, 0.35);
                        g.add(bottle);
                    }
                }
                g.position.set(bx, 0, bz);
                scene.add(g);
                labelDefs.push({ name: 'REAGENT SHELF', pos: new THREE.Vector3(bx - 1.2, baseY + 0.3, bz + 0.35) });
            }

            if (items.includes('distillation')) {
                const g = new THREE.Group();
                const flask = new THREE.Mesh(new THREE.SphereGeometry(0.08, 12, 12), glassMat);
                flask.scale.y = 0.8;
                flask.position.set(1.2, baseY + 0.08, 0.2);
                g.add(flask);
                const tube1 = new THREE.Mesh(new THREE.CylinderGeometry(0.01, 0.01, 0.3, 8), glassMat);
                tube1.position.set(1.2, baseY + 0.2, 0.2);
                tube1.rotation.z = Math.PI / 4;
                g.add(tube1);
                const condenser = new THREE.Mesh(new THREE.CylinderGeometry(0.015, 0.015, 0.25, 8), glassMat);
                condenser.position.set(1.35, baseY + 0.25, 0.1);
                condenser.rotation.z = Math.PI / 3;
                g.add(condenser);
                const receiving = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.04, 0.03, 0.1, 12),
                    new THREE.MeshStandardMaterial({
                        color: 0x55ff99, transparent: true, opacity: 0.5,
                        emissive: 0x55ff99, emissiveIntensity: 0.2,
                    })
                );
                receiving.position.set(1.48, baseY + 0.05, 0.0);
                g.add(receiving);
                g.position.set(bx, 0, bz);
                scene.add(g);
                labelDefs.push({ name: 'DISTILLATION APPARATUS', pos: new THREE.Vector3(bx + 1.3, baseY + 0.4, bz + 0.1) });
            }

            labelDefs.forEach(ld => {
                interactables.push({ type: 'label', name: ld.name, pos: ld.pos.clone(), distance: 3.0 });
            });
        }

        function setupControls() {
            const startScreen = document.getElementById('start-screen');
            const crosshair = document.getElementById('crosshair');

            startScreen.addEventListener('click', () => {
                renderer.domElement.requestPointerLock();
            });

            document.addEventListener('pointerlockchange', () => {
                pointerLocked = !!document.pointerLockElement;
                startScreen.style.display = pointerLocked ? 'none' : 'flex';
                crosshair.style.display = pointerLocked ? 'block' : 'none';
            });

            document.addEventListener('mousemove', e => {
                if (!pointerLocked) return;
                yaw -= e.movementX * 0.002;
                pitch -= e.movementY * 0.002;
                pitch = Math.max(-Math.PI / 2 + 0.01, Math.min(Math.PI / 2 - 0.01, pitch));
                camera.rotation.y = yaw;
                camera.rotation.x = pitch;
            });

            document.addEventListener('keydown', e => {
                keys[e.code] = true;
                updateKeyIndicators();
                if (e.code === 'KeyL') toggleLights();
            });
            document.addEventListener('keyup', e => {
                keys[e.code] = false;
                updateKeyIndicators();
            });

            document.getElementById('light-toggle').addEventListener('click', toggleLights);
        }

        function updateKeyIndicators() {
            document.getElementById('key-a').classList.toggle('active', !!keys['KeyA']);
            document.getElementById('key-w').classList.toggle('active', !!keys['KeyW']);
            document.getElementById('key-s').classList.toggle('active', !!keys['KeyS']);
            document.getElementById('key-d').classList.toggle('active', !!keys['KeyD']);
            document.getElementById('key-shift').classList.toggle('active', !!keys['ShiftLeft'] || !!keys['ShiftRight']);
            document.getElementById('key-space').classList.toggle('active', !!keys['Space']);
        }

        const colliders = [];
        function updateColliders() {
            colliders.length = 0;
            interactables.filter(i => i.type === 'bench').forEach(b => colliders.push(b.box));
        }

        function checkCollision(pos, radius = 0.35) {
            for (const c of colliders) {
                const nearest = new THREE.Vector3(
                    Math.max(c.min.x, Math.min(pos.x, c.max.x)),
                    Math.max(c.min.y, Math.min(pos.y, c.max.y)),
                    Math.max(c.min.z, Math.min(pos.z, c.max.z))
                );
                if (pos.distanceTo(nearest) < radius) return true;
            }
            return false;
        }

        let fpsFrames = 0, fpsTime = 0, fpsDisplay = 0;

        function animate() {
            requestAnimationFrame(animate);
            const dt = Math.min(clock.getDelta(), 0.05);

            updateLighting(dt);

            if (pointerLocked) {
                const speed = (keys['ShiftLeft'] || keys['ShiftRight']) ? MOVE_SPEED * RUN_MULTIPLIER : MOVE_SPEED;
                const forward = new THREE.Vector3(-Math.sin(yaw), 0, -Math.cos(yaw));
                const right = new THREE.Vector3(Math.cos(yaw), 0, -Math.sin(yaw));

                const moveDir = new THREE.Vector3();
                if (keys['KeyW']) moveDir.add(forward);
                if (keys['KeyS']) moveDir.sub(forward);
                if (keys['KeyA']) moveDir.sub(right);
                if (keys['KeyD']) moveDir.add(right);
                if (moveDir.length() > 0) moveDir.normalize();

                velocity.x = moveDir.x * speed;
                velocity.z = moveDir.z * speed;

                if (keys['Space'] && onGround) {
                    velocity.y = JUMP_FORCE;
                    onGround = false;
                }
                velocity.y -= GRAVITY * dt;

                const newPos = camera.position.clone();
                newPos.x += velocity.x * dt;
                if (!checkCollision(newPos)) camera.position.x = newPos.x;
                else velocity.x = 0;

                const newPosZ = camera.position.clone();
                newPosZ.z += velocity.z * dt;
                if (!checkCollision(newPosZ)) camera.position.z = newPosZ.z;
                else velocity.z = 0;

                camera.position.y += velocity.y * dt;
                if (camera.position.y <= EYE_HEIGHT) {
                    camera.position.y = EYE_HEIGHT;
                    velocity.y = 0;
                    onGround = true;
                }

                camera.position.x = Math.max(-ROOM_W / 2 + 0.5, Math.min(ROOM_W / 2 - 0.5, camera.position.x));
                camera.position.z = Math.max(-ROOM_D / 2 + 0.5, Math.min(ROOM_D / 2 - 0.5, camera.position.z));

                updateLabels();
            }

            updateHUD(dt);
            renderer.render(scene, camera);
        }

        function updateLabels() {
            const tooltip = document.getElementById('label-tooltip');
            let hit = false;
            const camDir = new THREE.Vector3();
            camera.getWorldDirection(camDir);

            for (const item of interactables) {
                if (item.type !== 'label') continue;
                const dist = camera.position.distanceTo(item.pos);
                if (dist < item.distance) {
                    const dir = item.pos.clone().sub(camera.position).normalize();
                    if (camDir.dot(dir) > 0.82) {
                        tooltip.textContent = item.name;
                        tooltip.style.display = 'block';
                        tooltip.style.left = '50%';
                        tooltip.style.top = 'calc(50% - 60px)';
                        tooltip.style.transform = 'translateX(-50%)';
                        hit = true;
                        break;
                    }
                }
            }
            if (!hit) tooltip.style.display = 'none';
        }

        function updateHUD(dt) {
            fpsFrames++;
            fpsTime += dt;
            if (fpsTime >= 0.5) {
                fpsDisplay = Math.round(fpsFrames / fpsTime);
                fpsTime = 0;
                fpsFrames = 0;
            }
            document.getElementById('fps').textContent = fpsDisplay;
            document.getElementById('pos').textContent =
                `${camera.position.x.toFixed(1)}, ${camera.position.y.toFixed(1)}, ${camera.position.z.toFixed(1)}`;
        }

        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        init();
        updateColliders();
    </script>
</body>
</html>
